# Ruff configuration for the Olist Analytics Platform
# https://docs.astral.sh/ruff/configuration/

line-length = 100
indent-width = 4
target-version = "py311"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default args
]

[lint.per-file-ignores]
# Jupytext notebooks: imports after warnings.filterwarnings() is intentional
"notebooks/*.py" = ["E402"]
# Ingestion scripts: broad exception handling acceptable at pipeline boundary
"ingestion/*.py" = ["B007"]

[lint.isort]
known-first-party = ["ingestion", "data_quality", "orchestration", "scripts"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
